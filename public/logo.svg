<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：紫蓝色 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- 火焰渐变 -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- 铁砧金属渐变 -->
    <linearGradient id="anvilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0f0"/>
      <stop offset="50%" stop-color="#a0a0c0"/>
      <stop offset="100%" stop-color="#6a6a8a"/>
    </linearGradient>
    <!-- 光晕 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>
  
  <!-- 背景光晕 -->
  <ellipse cx="256" cy="220" rx="200" ry="180" fill="url(#glow)"/>

  <!-- ====== 铁砧 (Anvil) ====== -->
  <g filter="url(#softShadow)">
    <!-- 铁砧主体 -->
    <path d="M148 300 L364 300 L380 320 Q384 330 376 340 L136 340 Q128 330 132 320 Z" 
          fill="url(#anvilGrad)" opacity="0.95"/>
    <!-- 铁砧顶面 -->
    <path d="M168 270 L344 270 L364 300 L148 300 Z" 
          fill="#c0c0d8" opacity="0.95"/>
    <!-- 铁砧尖角（horn） -->
    <path d="M344 270 L400 258 Q412 254 408 264 L380 285 L364 300 Z" 
          fill="#b0b0c8" opacity="0.9"/>
    <!-- 铁砧底座 -->
    <path d="M160 340 L352 340 L368 380 Q372 392 360 392 L152 392 Q140 392 144 380 Z" 
          fill="#505068" opacity="0.9"/>
    <!-- 顶面高光 -->
    <path d="M178 272 L334 272 L340 278 L172 278 Z" 
          fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- ====== 锤子 (Hammer) ====== -->
  <g filter="url(#shadow)">
    <!-- 锤柄 -->
    <rect x="238" y="108" width="12" height="150" rx="4" 
          fill="#8B7355" transform="rotate(-35, 256, 200)"/>
    <!-- 锤柄纹理线 -->
    <line x1="242" y1="130" x2="242" y2="240" 
          stroke="#7A6348" stroke-width="2" stroke-dasharray="4,8"
          transform="rotate(-35, 256, 200)" opacity="0.5"/>
    
    <!-- 锤头 -->
    <rect x="212" y="88" width="64" height="36" rx="6" 
          fill="url(#mainGrad)" transform="rotate(-35, 256, 200)"/>
    <!-- 锤头高光 -->
    <rect x="216" y="92" width="56" height="8" rx="3" 
          fill="#ffffff" opacity="0.2" transform="rotate(-35, 256, 200)"/>
    <!-- 锤头底部阴影 -->
    <rect x="216" y="114" width="56" height="6" rx="2" 
          fill="#000000" opacity="0.15" transform="rotate(-35, 256, 200)"/>
  </g>

  <!-- ====== 火花 (Sparks) ====== -->
  <!-- 主火花 -->
  <circle cx="310" cy="248" r="4" fill="#f59e0b" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="335" cy="232" r="3" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="322" cy="220" r="2.5" fill="#fcd34d" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="348" cy="245" r="2" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="230" r="2" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <!-- 火花线条 -->
  <line x1="315" y1="252" x2="340" y2="238" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.4s" repeatCount="indefinite"/>
  </line>
  <line x1="305" y1="240" x2="325" y2="218" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.7s" repeatCount="indefinite"/>
  </line>

  <!-- ====== 齿轮装饰 (小) ====== -->
  <g transform="translate(120, 180)" opacity="0.15">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#6366f1" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#6366f1" stroke-width="2"/>
    <!-- 齿 -->
    <rect x="-3" y="-24" width="6" height="10" rx="2" fill="#6366f1"/>
    <rect x="-3" y="14" width="6" height="10" rx="2" fill="#6366f1"/>
    <rect x="-24" y="-3" width="10" height="6" rx="2" fill="#6366f1"/>
    <rect x="14" y="-3" width="10" height="6" rx="2" fill="#6366f1"/>
  </g>

  <!-- ====== 文字 TaskForge ====== -->
  <text x="256" y="448" text-anchor="middle" 
        font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" 
        font-size="52" font-weight="700" letter-spacing="3" fill="url(#mainGrad)">
    TaskForge
  </text>
  
  <!-- 文字下方装饰线 -->
  <line x1="176" y1="464" x2="336" y2="464" stroke="url(#mainGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
